<template>
    <div class="slds-p-around_medium">
        <h2><strong>Filters</strong></h2>

        <lightning-button
            label="Add Filter"
            onclick={handleAddFilter}
            class="slds-m-right_small">
        </lightning-button>

        <lightning-button
            label="Remove All"
            onclick={handleRemoveAll}>
        </lightning-button>

        <template for:each={filters} for:item="filter" for:index="index">
            <div key={filter.id} class="slds-m-top_medium">
                <label><strong>Field</strong></label>
                <select class="slds-select"
                        data-index={index}
                        name="field"
                        onchange={handleChange}>
                    <template if:true={wiredOpportunityFields.data}>
                        <template for:each={wiredOpportunityFields.data} for:item="field">
                            <option key={field} value={field}>{field}</option>
                        </template>
                    </template>
                </select>

                <label class="slds-m-top_small"><strong>Operator</strong></label>
                <select class="slds-select"
                        data-index={index}
                        name="operator"
                        onchange={handleChange}>
                    <template for:each={filterOption} for:item="ops">
                        <option key={ops.value} value={ops.value}>{ops.label}</option>
                    </template>
                </select>

                <label class="slds-m-top_small"><strong>Value</strong></label>
                <lightning-input
                    data-index={index}
                    name="value"
                    onchange={handleChange}>
                </lightning-input>

                <lightning-button
                    label="Remove"
                    data-index={index}
                    onclick={handleRemove}
                    class="slds-m-top_small">
                </lightning-button>
            </div>
        </template>

        <template if:true={showApplyOne}>
            <lightning-button
                label="Apply Filter"
                onclick={handleApply}
                class="slds-m-top_medium">
            </lightning-button>
        </template>

        <template if:true={showApplyAll}>
            <lightning-button
                label="Apply All Filters"
                onclick={handleApply}
                class="slds-m-top_medium">
            </lightning-button>
        </template>

        <!-- Applied Filters Summary Box -->
        <template if:true={hasFilters}>
            <div class="filter-summary-box slds-m-top_medium">
                <p class="matching-text">Matching all of these filters</p>
                <template for:each={filters} for:item="filter" for:index="index">
                    <div key={filter.id} class="filter-chip">
                        <span class="chip-field">{filter.field}</span>
                        <span class="chip-operator">{filter.operator}</span>
                        <span class="chip-value">{filter.value}</span>
                    </div>
                </template>
            </div>
        </template>

    </div>
</template>
